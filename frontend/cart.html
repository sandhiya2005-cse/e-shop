<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | E-Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 relative min-h-screen pb-20">
    <nav class="glass sticky top-0 z-50 px-6 py-4 mb-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">E-Shop</a>
            <div id="auth-links" class="flex items-center gap-4"></div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 pt-8">
        <h1 class="text-4xl font-bold text-slate-800 mb-8">Your Cart</h1>

        <div id="cart-content" class="bg-white rounded-3xl p-6 lg:p-8 shadow-sm border border-slate-100">
            <!-- Handled in JS -->
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
             // Require login to view cart effectively for placing orders
            if (!localStorage.getItem('token')) {
                window.location.href = 'auth.html?redirect=cart.html';
                return;
            }
            renderCart();
        });

        function renderCart() {
            const cartContent = document.getElementById('cart-content');
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');

            if (cart.length === 0) {
                cartContent.innerHTML = `
                    <div class="text-center py-12">
                        <svg class="w-16 h-16 text-slate-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        <h2 class="text-2xl font-semibold text-slate-700 mb-2">Your cart is empty</h2>
                        <a href="index.html" class="text-blue-600 hover:text-blue-700 font-medium">Continue Shopping →</a>
                    </div>
                `;
                return;
            }

            const total = getCartTotal();
            
            cartContent.innerHTML = `
                <div class="space-y-6 mb-8">
                    ${cart.map((item, index) => `
                        <div class="flex items-center justify-between gap-4 p-4 rounded-xl border border-slate-100 hover:border-slate-200 transition">
                            <div class="flex items-center gap-4">
                                <div class="w-20 h-20 rounded-lg overflow-hidden bg-slate-100">
                                     <img src="${getProductImage(item.image_url, item.id)}" class="w-full h-full object-cover">
                                </div>
                                <div>
                                    <h3 class="font-bold text-slate-800">${item.name}</h3>
                                    <p class="text-slate-500">₹${item.price.toLocaleString('en-IN')}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-6">
                                <div class="flex items-center gap-2 bg-slate-50 px-2 rounded-lg border border-slate-200">
                                    <button onclick="updateQuantity(${index}, -1)" class="w-8 h-8 flex items-center justify-center text-slate-500 hover:text-slate-700">-</button>
                                    <span class="font-medium w-4 text-center">${item.quantity}</span>
                                    <button onclick="updateQuantity(${index}, 1)" class="w-8 h-8 flex items-center justify-center text-slate-500 hover:text-slate-700">+</button>
                                </div>
                                <button onclick="removeItem(${index})" class="text-red-500 hover:text-red-700 p-2 rounded-full hover:bg-red-50 transition">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="border-t border-slate-100 pt-6 flex flex-col sm:flex-row justify-between items-center gap-6">
                    <div>
                        <p class="text-slate-500 mb-1">Total Amount</p>
                        <p class="text-3xl font-bold text-slate-900">₹${total.toLocaleString('en-IN')}</p>
                    </div>
                    <a href="checkout.html" class="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white px-8 py-4 rounded-xl font-bold text-lg shadow-lg shadow-green-500/30 transition transform hover:-translate-y-1 text-center">
                        Proceed to Checkout
                    </a>
                </div>
            `;
        }

        function updateQuantity(index, delta) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart[index].quantity += delta;
            
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            renderCart();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            renderCart();
        }
    </script>
</body>
</html>
