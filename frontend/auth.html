<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | E-Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 relative min-h-screen pb-20 flex items-center justify-center">

    <div class="max-w-md w-full mx-auto px-6 pt-12">
        <div class="text-center mb-10">
            <a href="index.html" class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">E-Shop</a>
            <h2 class="mt-6 text-3xl font-bold text-slate-900" id="auth-title">Welcome Back</h2>
            <p class="mt-2 text-sm text-slate-500" id="auth-subtitle">Log in to your account</p>
        </div>

        <div class="glass bg-white py-8 px-6 shadow-xl rounded-3xl sm:px-10 border border-white/40">
            <form id="auth-form" class="space-y-6">
                <div id="email-field" class="hidden">
                    <label class="block text-sm font-medium text-slate-700">Email address</label>
                    <div class="mt-1">
                        <input id="email" name="email" type="email" autocomplete="email" class="appearance-none block w-full px-4 py-3 border border-slate-200 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent sm:text-sm transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700">Username</label>
                    <div class="mt-1">
                        <input id="username" name="username" type="text" required class="appearance-none block w-full px-4 py-3 border border-slate-200 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent sm:text-sm transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700">Password</label>
                    <div class="mt-1">
                        <input id="password" name="password" type="password" required class="appearance-none block w-full px-4 py-3 border border-slate-200 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent sm:text-sm transition">
                    </div>
                </div>

                <div>
                    <button type="submit" id="submit-btn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md shadow-blue-500/30 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition">
                        Sign in
                    </button>
                </div>
            </form>

            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-200"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-slate-500">Or</span>
                    </div>
                </div>

                <div class="mt-6">
                    <button id="toggle-auth" class="w-full flex justify-center py-3 px-4 border border-slate-300 rounded-xl shadow-sm text-sm font-medium text-slate-700 bg-white hover:bg-slate-50 transition">
                        Create an account
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let isLogin = true;
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const toggleBtn = document.getElementById('toggle-auth');
            const submitBtn = document.getElementById('submit-btn');
            const emailField = document.getElementById('email-field');
            const emailInput = document.getElementById('email');
            
            toggleBtn.addEventListener('click', (e) => {
                e.preventDefault();
                isLogin = !isLogin;
                if (isLogin) {
                    title.textContent = 'Welcome Back';
                    subtitle.textContent = 'Log in to your account';
                    toggleBtn.textContent = 'Create an account';
                    submitBtn.textContent = 'Sign in';
                    emailField.classList.add('hidden');
                    emailInput.removeAttribute('required');
                } else {
                    title.textContent = 'Join E-Shop';
                    subtitle.textContent = 'Create your account';
                    toggleBtn.textContent = 'Log in to existing account';
                    submitBtn.textContent = 'Sign up';
                    emailField.classList.remove('hidden');
                    emailInput.setAttribute('required', 'true');
                }
            });

            document.getElementById('auth-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                submitBtn.disabled = true;
                const originalText = submitBtn.textContent;
                submitBtn.innerHTML = '<span class="loader inline-block w-4 h-4 border-2 border-white rounded-full"></span>';

                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                try {
                    if (isLogin) {
                        const data = await API.post('/login', { username, email: "placeholder@email.com", password }); // email omitted for simplicity
                        localStorage.setItem('token', data.access_token);
                    } else {
                        const email = document.getElementById('email').value;
                        await API.post('/users', { username, email, password });
                        // auto login
                        const data = await API.post('/login', { username, email, password });
                        localStorage.setItem('token', data.access_token);
                    }
                    
                    showToast(isLogin ? 'Logged in successfully' : 'Account created');
                    
                    setTimeout(() => {
                        const urlParams = new URLSearchParams(window.location.search);
                        const redirect = urlParams.get('redirect') || 'index.html';
                        window.location.href = redirect;
                    }, 1000);
                } catch (err) {
                    showToast(err.detail || 'Authentication failed', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            });
        });
    </script>
</body>
</html>
