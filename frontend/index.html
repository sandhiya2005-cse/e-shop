<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop | Modern Commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 relative min-h-screen pb-20">
    <nav class="glass sticky top-0 z-50 px-6 py-4 mb-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">E-Shop</a>
            <div class="flex-1 mx-8 relative hidden sm:block">
                <input type="text" id="search-bar" placeholder="Search for products, brands and more" class="w-full bg-slate-100/80 rounded-xl px-5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition border border-transparent focus:bg-white text-slate-800 font-medium placeholder-slate-400 backdrop-blur-md">
            </div>
            <div id="auth-links" class="flex items-center gap-4">
                <!-- Injected via auth.js -->
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6">
        <div class="mb-12 text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-800 mb-4 tracking-tight">Discover Amazing Products</h1>
            <p class="text-slate-500 max-w-2xl mx-auto text-lg">Shop everything you need with an intuitive, seamless experience. Powered by a modern stack.</p>
        </div>

        <div id="loader" class="flex justify-center my-20">
            <div class="loader w-12 h-12 border-4 border-slate-200 rounded-full"></div>
        </div>
        
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 opacity-0 transition-opacity duration-500">
            <!-- Products will be loaded here -->
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const products = await API.get('/products');
                const grid = document.getElementById('products-grid');
                const loader = document.getElementById('loader');
                
                loader.classList.add('hidden');
                grid.classList.remove('opacity-0');

                let allProducts = products;

                function renderProducts(productList) {
                    if(productList.length === 0) {
                        grid.innerHTML = '<div class="col-span-full text-center text-slate-500 py-10 text-lg">No products found matching your search.</div>';
                        return;
                    }
                    // Add a tiny info message so they know we have 5000!
                    let countHTML = `<div class="col-span-full mb-4 text-slate-500 font-medium pb-2 border-b border-slate-200">
                        Showing ${Math.min(productList.length, 250)} of ${productList.length} products
                    </div>`;

                    grid.innerHTML = countHTML + productList.slice(0, 250).map(p => `
                        <div class="product-card glass rounded-2xl overflow-hidden shadow-sm flex flex-col h-full bg-white relative group">
                            <a href="product.html?id=${p.id}" class="block overflow-hidden relative pb-[75%] bg-slate-100">
                                <img src="${getProductImage(p.image_url, p.id)}" alt="${p.name}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition duration-500">
                            </a>
                            <div class="p-5 flex flex-col flex-grow">
                                <h2 class="text-sm font-semibold text-slate-800 mb-2 leading-tight">${p.name}</h2>
                                <p class="text-slate-900 font-bold text-xl mb-4">₹${p.price.toLocaleString('en-IN')}</p>
                                <div class="mt-auto flex justify-between gap-2">
                                    <a href="product.html?id=${p.id}" class="flex-1 bg-slate-100 text-slate-700 text-center py-2.5 rounded-xl hover:bg-slate-200 transition font-medium">Details</a>
                                    <button onclick='addToCart(${JSON.stringify(p).replace(/'/g, "&#39;")})' class="flex-1 bg-blue-600 text-white py-2.5 rounded-xl hover:bg-blue-700 transition font-medium shadow-md shadow-blue-500/20">Add</button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                }

                renderProducts(allProducts);

                const searchBar = document.getElementById('search-bar');
                if (searchBar) {
                    searchBar.addEventListener('input', (e) => {
                        const term = e.target.value.toLowerCase();
                        const filtered = allProducts.filter(p => 
                            p.name.toLowerCase().includes(term) || 
                            (p.description && p.description.toLowerCase().includes(term))
                        );
                        renderProducts(filtered);
                    });
                }
            } catch (err) {
                console.error(err);
                document.getElementById('loader').innerHTML = '<span class="text-red-500">Failed to load products. Is the backend running?</span>';
            }
        });
    </script>
</body>
</html>
