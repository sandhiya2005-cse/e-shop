<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | E-Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 min-h-screen pb-20">
    <nav class="glass sticky top-0 z-50 px-6 py-4 mb-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">E-Shop</a>
            <div id="auth-links" class="flex items-center gap-4"></div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pt-8">
        <a href="index.html" class="text-slate-500 hover:text-blue-600 inline-flex items-center gap-2 mb-8 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to Catalog
        </a>

        <div id="loader" class="flex justify-center my-20">
            <div class="loader w-12 h-12 border-4 border-slate-200 rounded-full"></div>
        </div>

        <div id="product-details" class="hidden grid grid-cols-1 md:grid-cols-2 gap-12 bg-white rounded-3xl p-8 lg:p-12 shadow-sm border border-slate-100">
            <!-- Handled in JS -->
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const detailsDiv = document.getElementById('product-details');
            const loader = document.getElementById('loader');

            if (!id) {
                loader.innerHTML = '<span class="text-red-500">Invalid Product ID</span>';
                return;
            }

            try {
                const product = await API.get(`/products/${id}`);
                loader.classList.add('hidden');
                detailsDiv.classList.remove('hidden');

                detailsDiv.innerHTML = `
                    <div class="rounded-2xl overflow-hidden shadow-sm h-96 relative bg-slate-100">
                        <img src="${getProductImage(product.image_url, product.id)}" alt="${product.name}" class="absolute inset-0 w-full h-full object-cover">
                    </div>
                    <div class="flex flex-col justify-center">
                        <h1 class="text-4xl font-extrabold text-slate-900 mb-4">${product.name}</h1>
                        <p class="text-3xl text-blue-600 font-bold mb-6">₹${product.price.toLocaleString('en-IN')}</p>
                        <p class="text-slate-600 text-lg leading-relaxed mb-8">${product.description || 'No description available for this product.'}</p>
                        
                        <div class="mt-auto">
                            <button onclick='addToCart(${JSON.stringify(product).replace(/'/g, "&#39;")})' 
                                class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 px-10 rounded-xl shadow-lg shadow-blue-500/30 transition transform hover:-translate-y-1 text-lg">
                                Add to Cart
                            </button>
                        </div>
                    </div>
                `;
            } catch (err) {
                console.error(err);
                loader.innerHTML = '<span class="text-red-500">Product not found.</span>';
            }
        });
    </script>
</body>
</html>
