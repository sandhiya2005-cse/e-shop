<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Support | E-Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chat-bubble { max-width: 80%; border-radius: 1.2rem; padding: 0.75rem 1rem; }
        .bot { background-color: #f1f5f9; color: #1e293b; border-bottom-left-radius: 0.2rem; }
        .user { background-color: #2563eb; color: #ffffff; border-bottom-right-radius: 0.2rem; margin-left: auto; }
        #chat-window { scrollbar-width: thin; }
    </style>
</head>
<body class="bg-slate-50 relative min-h-screen flex flex-col">
    <!-- Navbar (matching index.html) -->
    <nav class="glass sticky top-0 z-50 px-6 py-4 mb-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">E-Shop</a>
            <div id="auth-links" class="flex items-center gap-4">
                <!-- Injected via auth.js -->
            </div>
        </div>
    </nav>

    <!-- Main Chat Content -->
    <main class="flex-grow max-w-4xl mx-auto w-full px-4 mb-10 flex flex-col h-[calc(100vh-140px)]">
        <div class="mb-6 text-center">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Customer Support</h1>
            <p class="text-slate-500 text-sm mt-1">Ask questions about products, shipping, and returns.</p>
        </div>

        <div class="glass flex-grow flex flex-col bg-white rounded-3xl overflow-hidden shadow-sm border border-slate-100">
            <!-- Chat Window -->
            <div id="chat-window" class="flex-grow p-6 overflow-y-auto flex flex-col gap-4">
                <div class="chat-bubble bot shadow-sm">
                    Hello! I'm the E-Shop virtual assistant. How can I help you today?
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-4 bg-slate-50 border-t border-slate-100 flex gap-2 items-center">
                <input type="text" id="chat-input" placeholder="Type your message..." 
                    class="flex-grow bg-white border border-slate-200 rounded-full px-5 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition shadow-sm text-slate-800 font-medium placeholder-slate-400">
                <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white rounded-full p-3 transition shadow-md shadow-blue-500/30 flex-shrink-0 flex items-center justify-center h-12 w-12">
                    <svg class="w-5 h-5 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/chatbot.js"></script>
</body>
</html>
